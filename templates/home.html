<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Enhanced Face Recognition Attendance System</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Source+Sans+Pro:wght@300&display=swap"
 
        rel="stylesheet">
<style>
   *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* Animated gradient background */
body{
    background:linear-gradient(-45deg,#021774,#1c07e1,#0b0796,#050bb3);
    background-size:400% 400%;
    animation:gradientMove 12s ease infinite;
    padding:30px;
}

/* Background animation */
@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Header */
.header{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    color:white;
    padding:25px;
    font-size:40px;
    text-align:center;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    margin-bottom:30px;
    animation:fadeDown 1s ease;
}

@keyframes fadeDown{
    from{opacity:0; transform:translateY(-30px);}
    to{opacity:1; transform:translateY(0);}
}

/* Layout */
.section,
.approval-section{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
    margin:30px 0;
}

/* Card style */
.col{
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:25px;
    min-height:320px;
    box-shadow:0 10px 35px rgba(0,0,0,0.2);
    transition:all 0.3s ease;
    animation:fadeUp 0.8s ease;
}

.col:hover{
    transform:translateY(-10px) scale(1.02);
    box-shadow:0 15px 45px rgba(0,0,0,0.35);
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}

/* Card header */
.col h2{
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    padding:12px;
    border-radius:10px;
    font-size:22px;
    text-align:center;
    margin-bottom:20px;
}

/* Buttons */
.btn,
.btn-approve{
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    padding:12px;
    width:100%;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
    transition:0.3s;
}

.btn:hover,
.btn-approve:hover{
    transform:scale(1.05);
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

/* Inputs */
input,
select{
    padding:10px;
    width:100%;
    border:none;
    border-radius:8px;
    margin-top:10px;
    background:rgba(255,255,255,0.8);
}

/* Clock & Date */
#clock,#date{
    text-align:center;
    font-size:18px;
    margin-top:5px;
    color:white;
}

/* Dark mode */
.dark-theme{
    background:linear-gradient(120deg,#141e30,#243b55);
}

.dark-theme .col{
    background:rgba(0,0,0,0.5);
}

.dark-theme .header{
    background:rgba(0,0,0,0.6);
}
</style>
</head>

<body>
    <div class="header">
        <h1>Enhanced Face Recognition Attendance System</h1>
        <div id="clock"></div>
        <div id="date"></div>
        <!-- <button type="button" onclick="toggleTheme()" style="top: 50px;right: 45%;">Switch Theme</button> -->
    </div>

    <div class="section">
        <div class="col">
            <h2>Today's Attendance <i class="material-icons">assignment</i></h2>
            <button type="button" class="btn" onclick="checkLocationAndPositionForAttendance()">
                Take Attendance <i class="material-icons">beenhere</i>
            </button>
        </div>

        <div class="col">
            <!-- Inside the "Add New User" Form -->
            <form action="/add" method="POST" enctype="multipart/form-data">
                <h2>Add New User <i class="material-icons">control_point_duplicate</i></h2>

                <label><b>Enter New User Name*</b></label><br>
                <input type="text" id="newusername" name="newusername" required /><br><br>

                <label><b>Enter New User ID*</b></label><br>
                <input type="number" id="newuserid" name="newuserid" required><br><br>

                <label><b>Select Department*</b></label><br>
                <select id="department" name="department" required>
                    <option value="">-- Select Department --</option>
                    <option value="Artificial Intelligence and Data Science">Artificial Intelligence and Data Science</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Electronics and Communication">Electronics and Communication</option>
                    <option value="Mechanical">Mechanical</option>
                    <option value="Civil">Civil</option>
                    <option value="Electrical">Electrical</option>
                    <option value="Information Technology">Information Technology</option>
                </select><br><br>
                <button type="submit">Add New User</button><br><br>
            </form>

        </div>

        
        <div class="col">
            <h2>Attendance History <i class="material-icons">history</i></h2>
            <button type="button" class="btn" onclick="goToAttendanceHistory()">
                View History <i class="material-icons">event_note</i>
            </button>
        </div>
    </div>

    <div class="approval-section">
        <div class="col">
            <h2>Admin Approval</h2>
            <button type="button" class="btn-approve" onclick="confirmAction(approveAttendance)">Go to Admin
                Approval</button>
        </div>
        <div class="col">
            <h2>Generate Report</h2>
            <button type="button" class="btn-approve" onclick="confirmAction(generateReport)">Go to Generate
                Report</button>
        </div>
        
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString();
            const dateString = now.toLocaleDateString(undefined, {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            document.getElementById('clock').innerText = `Current Time: ${timeString}`;
            document.getElementById('date').innerText = `Date: ${dateString}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function toggleTheme() {
            document.body.classList.toggle("dark-theme");
        }

        function speak(message) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(message);
            utter.rate = 1;
            synth.speak(utter);
        }

        function confirmAction(action) {
            if (confirm("Are you sure you want to proceed?")) {
                action();
            } else {
                alert("Action canceled.");
                speak("Action canceled");
            }
        }

        function approveAttendance() {
            speak("Redirecting to Admin Approval");
            window.location.href = "/admin_approval";
        }

        function generateReport() {
            speak("Generating report, please wait");
            window.location.href = "/generate_report";
        }

        function goToDashboard() {
            speak("Redirecting to Dashboard");
            window.location.href = "/dashboard";
        }

        function goToAttendanceHistory() {
            speak("Opening attendance history");
            window.location.href = "/attendance_history";
        }

        function checkLocationAndPositionForAttendance() {

    if (navigator.geolocation) {

        navigator.geolocation.getCurrentPosition(position => {

            const userLat = position.coords.latitude;
            const userLng = position.coords.longitude;

            // Asakalathur coordinates
            const targetLat = 11.4487467;
            const targetLng = 78.2205563;

            const radius = getDistance(userLat, userLng, targetLat, targetLng);

            console.log("Distance from Kakkaveri:", radius);

            // Allow within 500 meters
            if (radius <  500000000) {

                speak("Location verified. Please sit in the correct position for the camera.");
                alert("Location verified. Please sit in the correct position for the camera.");

                window.location.href = "/start";

            } else {

                speak("You are not in Asakalathur. Attendance not allowed.");
                alert("You are not in Asakalathur!");

            }

        }, () => {

            speak("Unable to retrieve your location.");
            alert("Unable to retrieve your location.");

        });

    } else {

        speak("Geolocation is not supported by this browser.");
        alert("Geolocation is not supported by this browser.");

    }
}


/* Haversine distance formula */
function getDistance(lat1, lon1, lat2, lon2) {

    const R = 6371; // Earth radius in km
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;

    const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) *
        Math.sin(dLon / 2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

    return R * c; // distance in km
}
    </script>
</body>

</html>
