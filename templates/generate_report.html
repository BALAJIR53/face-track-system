<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet" 
        integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">
    <title>Generate Report</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7fc;
            margin: 0;
            padding: 0;
            color: #333;
        }

        .container {
            max-width: 700px;
            margin: 50px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            animation: fadeIn 1s ease-out;
        }

        h1 {
            text-align: center;
            color: #007bff;
            margin-bottom: 20px;
        }

        p {
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
            color: #555;
        }

        button {
            width: 100%;
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #218838;
        }

        .form-control {
            border-radius: 5px;
            border: 1px solid #ccc;
            padding: 12px;
            font-size: 16px;
        }

        .form-check-input {
            margin-top: 0.3rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .back-button {
            display: block;
            width: 200px;
            margin: 20px auto;
            background-color: #007bff;
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            text-decoration: none;
        }

        .back-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <div class="container mt-5">
        <h1>Generate Attendance Report</h1>
        <p>Select the options below to generate a report:</p>
        <form action="/download_report" method="POST">
            <div class="mb-3">
                <label for="reportDate" class="form-label">Select Date</label>
                <input type="date" id="reportDate" name="reportDate" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="department" class="form-label">Select Department</label>
                <select id="department" name="department" class="form-control" required>
                    <option value="" disabled selected>Choose...</option>
                    <option value="CSE">CSE</option>
                    <option value="ECE">ECE</option>
                    <option value="EEE">EEE</option>
                    <option value="MECH">MECH</option>
                    <option value="CIVIL">CIVIL</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="year" class="form-label">Select Year</label>
                <select id="year" name="year" class="form-control" required>
                    <option value="" disabled selected>Choose...</option>
                    <option value="1st">1st Year</option>
                    <option value="2nd">2nd Year</option>
                    <option value="3rd">3rd Year</option>
                    <option value="4th">4th Year</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Admin Email (Optional)</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="Enter admin email">
            </div>
            <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" id="notifyAdmin" name="notifyAdmin">
                <label class="form-check-label" for="notifyAdmin">Notify Admin via Email</label>
            </div>
            <button type="submit" class="btn btn-primary">Generate Report</button>
        </form>

        <!-- Back to Home Button -->
        <a href="#" id="backToHome" class="back-button">Back to Home</a>
    </div>

    <script>
        // Back to Home button functionality
        document.getElementById('backToHome').addEventListener('click', function() {
            window.location.href = '/home';  // Redirect to the home page
        });
    </script>

</body>

</html>
