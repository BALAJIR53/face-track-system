<!doctype html>
<html lang="en">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Generate Attendance Report</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-width:700px;
width:100%;
animation:fadeIn 1s ease;
}

h1{
text-align:center;
margin-bottom:20px;
color:#4c67db;
}

p{
text-align:center;
margin-bottom:25px;
}

.form-control{
border-radius:8px;
padding:10px;
}

button{
padding:12px;
border-radius:8px;
font-weight:bold;
}

.btn-generate{
background:#28a745;
color:white;
}

.btn-generate:hover{
background:#218838;
}

.back-button{
display:block;
width:200px;
margin:20px auto 0;
background:#007bff;
color:white;
text-align:center;
padding:10px;
border-radius:8px;
text-decoration:none;
}

.back-button:hover{
background:#0056b3;
}

#loader{
display:none;
text-align:center;
margin-top:20px;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

</style>

</head>

<body>

<div class="container">

<h1>📊 Generate Attendance Report</h1>

<p>Select filters to generate attendance reports</p>

<form action="/download_report" method="POST" id="reportForm">

<!-- Report Type -->

<div class="mb-3">
<label class="form-label">Report Type</label>
<select name="reportType" class="form-control" required>
<option value="daily">Daily Report</option>
<option value="monthly">Monthly Report</option>
<option value="custom">Custom Date Range</option>
</select>
</div>

<!-- Start Date -->

<div class="mb-3">
<label class="form-label">Start Date</label>
<input type="date" name="startDate" class="form-control" required>
</div>

<!-- End Date -->

<div class="mb-3">
<label class="form-label">End Date (for custom)</label>
<input type="date" name="endDate" class="form-control">
</div>

<!-- Department -->

<div class="mb-3">
<label class="form-label">Department</label>
<select name="department" class="form-control">

<option value="ALL">All Departments</option>
<option value="CSE">CSE</option>
<option value="ECE">ECE</option>
<option value="EEE">EEE</option>
<option value="MECH">MECH</option>
<option value="CIVIL">CIVIL</option>

</select>
</div>

<!-- Year -->

<div class="mb-3">
<label class="form-label">Year</label>
<select name="year" class="form-control">

<option value="ALL">All Years</option>
<option value="1st">1st Year</option>
<option value="2nd">2nd Year</option>
<option value="3rd">3rd Year</option>
<option value="4th">4th Year</option>

</select>
</div>

<!-- Student Roll Filter -->

<div class="mb-3">
<label class="form-label">Student Roll (Optional)</label>
<input type="text" name="roll" class="form-control" placeholder="Enter Roll Number">
</div>

<!-- Report Format -->

<div class="mb-3">
<label class="form-label">Download Format</label>
<select name="format" class="form-control">
<option value="csv">CSV</option>
<option value="excel">Excel</option>
<option value="pdf">PDF</option>
</select>
</div>

<!-- Email -->

<div class="mb-3">
<label class="form-label">Send Report to Email (Optional)</label>
<input type="email" name="email" class="form-control" placeholder="Enter email">
</div>

<!-- Notify Admin -->

<div class="form-check form-switch mb-3">
<input class="form-check-input" type="checkbox" name="notifyAdmin">
<label class="form-check-label">Notify Admin</label>
</div>

<!-- Buttons -->

<button type="submit" class="btn btn-generate w-100">
Generate Report
</button>

</form>

<!-- Loader -->

<div id="loader">

<div class="spinner-border text-primary"></div>
<p>Generating Report...</p>

</div>

<!-- Back Button -->

<a href="/home" class="back-button">⬅ Back to Dashboard</a>

</div>

<script>

document.getElementById("reportForm").addEventListener("submit",function(){
document.getElementById("loader").style.display="block";
});

</script>

</body>
</html>
